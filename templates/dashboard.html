<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    text-align: center;
}

.card {
    width: 400px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2 {
    color: #4CAF50;
}

a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    background: #4CAF50;
    color: white;
    padding: 10px 20px;
}
</style>

</head>

<body>

<div class="card">
<h2>Registration Successful 🎉</h2>

<p><strong>Name:</strong> {{ name }}</p>
<p><strong>Images Captured:</strong> {{ total }}</p>

<a href="/">Back to Home</a>
</div>

</body>
</html>
